name: Build quickshell-git

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # daily, because chaos needs maintenance

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Setup system
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install yay
        run: |
          su - builder -c '
            git clone https://aur.archlinux.org/yay.git
            cd yay
            makepkg -si --noconfirm
          '

      - name: Build quickshell-git (with deps)
        run: |
          su - builder -c '
            yay -S --noconfirm quickshell-git
          '

      - name: Collect built packages
        run: |
          mkdir -p /output
          find /home/builder/.cache/yay/ -name "*.pkg.tar.zst" -exec cp {} /output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickshell-git
          path: /output/
