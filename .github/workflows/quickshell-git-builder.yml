name: AUR Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated list of extra packages to build (optional)'
        required: false
        default: ''
  schedule:
    - cron: "0 3 * * *"  # daily, because chaos needs maintenance

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [quickshell-git]
    container:
      image: archlinux:latest

    steps:
      - name: Setup system
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install yay-bin
        run: |
          su - builder -c '
            git clone https://aur.archlinux.org/yay-bin.git
            cd yay-bin
            makepkg -si --noconfirm
          '

      - name: Build ${{ matrix.package }}
        run: |
          su - builder -c '
            yay -S --noconfirm ${{ matrix.package }}
          '

      - name: Collect built packages
        run: |
          mkdir -p /output
          find /home/builder/.cache/yay/ -name "*.pkg.tar.zst" -exec cp {} /output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: /output/
